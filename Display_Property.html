<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: red;
            height: 200px;
            visibility: hidden;
        }
        span{
           background-color: rebeccapurple; 
           height: 200px;
           width: 200px;
           display: inline;
        }

    </style>
</head>
<body>
    <div>Hello</div>
    <span>hello</span>
</body>
</html>
