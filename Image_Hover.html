<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
           height: 200px;
           width: 300px;
           perspective: 1000px;
           margin: 100px auto;
        }
        .child-a{
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .parent:hover .child-a{
            transform: rotateY(180deg);
        }
        .child-b, .child-c{
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
        }
        .child-b{
          background-image: url("https://wallpaperaccess.com/full/138643.jpg");
          background-size: cover ;
          background-position: center;
        }
        .child-c{
          background-color: red;
          color: gold;
          transform: rotateY(180deg);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 20px;
          font-weight: bold;
        }
        
    </style>
</head>
<body>
    <div class="parent">
        <div class="child-a">
            <div class="child-b"></div>
            <div class="child-c">
                <h2>Welcome to my site!</h2>
            </div>
        </div>
    </div>
</body>
</html>
