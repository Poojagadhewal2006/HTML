<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
              padding: 10px;
              background-color: black;
              color: white;
              height: 30px;
              display: flex;
              justify-content: space-between;
              align-items: center;  
        }
        #child {
            color: white;
            display: flex;
            gap: 20px;
        }
        button{
          margin-right: 5px;
          padding: 4px;
          background-color: orange;
          border-radius: 11px;
          height: 30px;
          width: 80px;
          border: none;
        }
         h3{
           margin: 5px;
           color: orange;
        }
    </style>
</head>
<body>
    <div id="parent">
        <h3>CodingThinker</h3>
        <div id="child">
          <a>Learn</a>
          <a>Practice</a>
          <a>Get hired</a>
          <a>IDE</a> 
         </div>
         <button>Login</button>
    </div>
</body>
</html>
